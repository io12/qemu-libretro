# Inclusion templates, required for the build to work
include:
  ################################## DESKTOPS ################################
  # Windows 64-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/windows-x64-mingw.yml'

  # Windows 32-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/windows-i686-mingw.yml'

  # # Windows msvc10 64-bit
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/windows-x64-msvc10-msys2.yml'

  # # Windows msvc10 32-bit
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/windows-i686-msvc10-msys2.yml'

  # # Windows msvc05 32-bit
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/windows-i686-msvc05-msys2.yml'

  # # DJGPP
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/djgpp-static.yml'

  # Linux 64-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/linux-x64.yml'

  # Linux 32-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/linux-i686.yml'

  # MacOS PowerPC 32-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/osx-ppc.yml'

  # MacOS 64-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/osx-x64.yml'

  # MacOS ARM 64-bit
  - project: 'libretro-infrastructure/ci-templates'
    file: '/osx-arm64.yml'

  ################################## CELLULAR ################################
  # Android
  - project: 'libretro-infrastructure/ci-templates'
    file: '/android-make.yml'

  # iOS
  - project: 'libretro-infrastructure/ci-templates'
    file: '/ios-arm64.yml'

  # # iOS (armv7)
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/ios9.yml'

  ################################## CONSOLES ################################
  # # PlayStation Portable
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/psp-static.yml'

  # # PlayStation Vita
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/vita-static.yml'

  # # PlayStation2
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/ps2-static.yml'

  # # PlayStation3
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/psl1ght-static.yml'

  # # PlayStation 4
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/orbis-static.yml'

  # # Nintendo 3DS
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/ctr-static.yml'

  # # Nintendo GameCube
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/ngc-static.yml'

  # # Nintendo Wii
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/wii-static.yml'

  # # Nintendo WiiU
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/wiiu-static.yml'

  # # Nintendo Switch
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/libnx-static.yml'

  # # tvOS (AppleTV)
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/tvos-arm64.yml'

  # # OpenDingux
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/dingux-mips32.yml'

  # # OpenDingux (ARM)
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/dingux-arm32.yml'

  #################################### MISC ##################################
  # # Emscripten
  # - project: 'libretro-infrastructure/ci-templates'
  #   file: '/emscripten-static.yml'

# Stages for building
stages:
  - build-prepare
  - build-shared
  - build-static

