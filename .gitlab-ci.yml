# DESCRIPTION: GitLab CI/CD for libRetro (NOT FOR GitLab-proper)

##############################################################################
################################# BOILERPLATE ################################
##############################################################################

# Core definitions
.core-defs:
  variables:
    MAKEFILE: Makefile.libretro-gitlab
    GIT_SUBMODULE_STRATEGY: recursive

# QEMU target definitions
.core-defs-aarch64:
  extends: .core-defs
  variables:
    QEMU_TARGET: aarch64
    CORENAME: qemu_aarch64
